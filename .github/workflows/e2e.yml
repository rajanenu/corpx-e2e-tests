name: CorpX E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run regression suite
        env:
          CORPX_BASE_URL: ${{ secrets.CORPX_BASE_URL }}
          CORPX_API_BASE_URL: ${{ secrets.CORPX_API_BASE_URL }}
          CORPX_DEFAULT_ORGANIZATION: ${{ secrets.CORPX_DEFAULT_ORGANIZATION }}
          CORPX_DEFAULT_CITY: ${{ secrets.CORPX_DEFAULT_CITY }}
          CORPX_FIXED_OTP: ${{ secrets.CORPX_FIXED_OTP }}
        run: npm test

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
